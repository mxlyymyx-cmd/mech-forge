name: Build Plugin

on:
  push:
    branches: [ "main" ]
    paths:
      - "plugin/**"
      - ".github/workflows/plugin-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🛠 安装 Visual Studio Build Tools
        uses: microsoft/setup-msbuild@v2

      - name: 📦 安装 NuGet CLI
        uses: nuget/setup-nuget@v2

      - name: 📥 下载 SolidWorks Interop DLL（从 NuGet）
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path plugin\libs | Out-Null
          
          $packages = @(
            @{id="SolidWorks.Interop.sldworks"; version="32.1.0"},
            @{id="SolidWorks.Interop.swcommands"; version="32.1.0"},
            @{id="SolidWorks.Interop.swconst"; version="32.1.0"},
            @{id="SolidWorks.Interop.swpublished"; version="32.1.0"}
          )
          
          foreach ($pkg in $packages) {
            $nupkg = "$($pkg.id).$($pkg.version).nupkg"
            $url = "https://www.nuget.org/api/v2/package/$($pkg.id)/$($pkg.version)"
            
            Write-Host "📥 下载: $($pkg.id) v$($pkg.version)"
            Invoke-WebRequest -Uri $url -OutFile "plugin\libs\$nupkg" -UseBasicParsing
            
            # 解压 nupkg（其实是个 ZIP）
            $extractDir = "plugin\libs\$($pkg.id)"
            New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
            Expand-Archive -Path "plugin\libs\$nupkg" -DestinationPath $extractDir -Force
            
            # 复制 DLL 到 libs/ 根目录
            $dllName = "$($pkg.id).dll"
            $dllPath = Join-Path $extractDir "lib\net451\$dllName"
            if (!(Test-Path $dllPath)) {
              $dllPath = Join-Path $extractDir "lib\net40\$dllName"
            }
            if (!(Test-Path $dllPath)) {
              $dllPath = Join-Path $extractDir "lib\net45\$dllName"
            }
            
            if (Test-Path $dllPath) {
              Copy-Item $dllPath -Destination "plugin\libs\$dllName" -Force
              Write-Host "  ✅ $dllName 就绪"
            } else {
              Write-Host "  ⚠️  未找到 $dllName，搜索 lib/ 目录..."
              $found = Get-ChildItem -Path $extractDir -Recurse -Filter "$($pkg.id).dll" | Select-Object -First 1
              if ($found) {
                Copy-Item $found.FullName -Destination "plugin\libs\$dllName" -Force
                Write-Host "  ✅ $dllName 就绪 (从 $($found.FullName))"
              } else {
                Write-Host "  ❌ 找不到 $dllName"
              }
            }
            
            # 清理
            Remove-Item "plugin\libs\$nupkg" -Force -ErrorAction SilentlyContinue
            Remove-Item $extractDir -Recurse -Force -ErrorAction SilentlyContinue
          }
          
          # 验证
          Write-Host ""
          Write-Host "验证 DLL..."
          Get-ChildItem plugin\libs\*.dll | ForEach-Object {
            Write-Host "  ✅ $($_.Name) ($($_.Length / 1KB) KB)"
          }

      - name: 🔨 编译 C# 插件
        shell: pwsh
        run: |
          if (Test-Path "plugin/libs/SolidWorks.Interop.sldworks.dll") {
            Write-Host "✅ SolidWorks Interop DLL 已就绪，开始编译..."
            msbuild plugin/MechForgeAddin.csproj /p:Configuration=Release /p:Platform=x64
            if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ 编译成功"
            } else {
              Write-Host "❌ 编译失败"
              exit 1
            }
          } else {
            Write-Host "⚠️ 未找到 SolidWorks Interop DLL，跳过插件构建"
            exit 1
          }

      - name: 📦 打包插件 ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path MechForge-Plugin-v1.0
          Copy-Item plugin/bin/x64/Release/MechForgeAddin.dll -Destination MechForge-Plugin-v1.0/
          Copy-Item plugin/install.ps1 -Destination MechForge-Plugin-v1.0/
          Copy-Item plugin/README-install.md -Destination MechForge-Plugin-v1.0/
          Compress-Archive -Path "MechForge-Plugin-v1.0/*" -DestinationPath MechForge-Plugin-win64.zip -Force

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: MechForge-Plugin-win64
          path: MechForge-Plugin-win64.zip
          if-no-files-found: error
